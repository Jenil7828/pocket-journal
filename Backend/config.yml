# ════════════════════════════════════════════════════════════════
# Pocket Journal — Master Configuration
# Structure:
#   server      — Flask server settings
#   app         — application feature flags
#   logging     — log levels
#   firestore   — collection names
#   api         — ALL external API settings (limits, endpoints,
#                  rate limiting, media providers, export, entries)
#   ml          — ALL ML settings (mood, summarization, insights,
#                  embedding, model store, model versions)
#   recommendation — intent, ranking, candidate pipeline
#   cache       — media cache (Firestore-backed)
#   jobs        — background job config
# ════════════════════════════════════════════════════════════════


# ── Server ───────────────────────────────────────────────────────
server:
  port: 5000                             # PORT
  flask_debug: true                      # FLASK_DEBUG
  disable_reloader: true                 # DISABLE_RELOADER


# ── Application flags ────────────────────────────────────────────
app:
  timezone: "Asia/Kolkata"              # APP_TIMEZONE
  enable_llm: true                      # ENABLE_LLM
  enable_insights: true                 # ENABLE_INSIGHTS
  force_color: true                     # FORCE_COLOR
  hf_hub_disable_xet: true              # HF_HUB_DISABLE_XET
  tf_cpp_min_log_level: "2"             # TF_CPP_MIN_LOG_LEVEL
  mood_tracking_enabled_default: true   # APP_MOOD_TRACKING_ENABLED_DEFAULT
  summary_fallback_length: 200          # APP_SUMMARY_FALLBACK_LENGTH


# ── Logging ──────────────────────────────────────────────────────
logging:
  app_level: "INFO"                     # APP_LOG_LEVEL
  werkzeug_level: "WARNING"             # WERKZEUG_LOG_LEVEL
  firebase_level: "WARNING"             # FIREBASE_LOG_LEVEL


# ── Firestore ────────────────────────────────────────────────────
firestore:
  collections:
    journal_entries: "journal_entries"
    entry_analysis: "entry_analysis"
    insights: "insights"
    insight_entry_mapping: "insight_entry_mapping"
    users: "users"
    journal_embeddings: "journal_embeddings"
    user_vectors: "user_vectors"
    analysis_metadata: "analysis_metadata"


# ── API ──────────────────────────────────────────────────────────
# All external-facing API config: request behaviour, pagination,
# provider endpoints, and per-service limits.
api:

  # General request behaviour
  request_timeout: 10                   # API_REQUEST_TIMEOUT
  request_max_retries: 1                # API_REQUEST_MAX_RETRIES

  # Pagination defaults used by routes and services
  default_limit: 10                     # API_DEFAULT_LIMIT
  max_limit: 100                        # API_MAX_LIMIT

  # Journal entries
  entries_max_limit: 100                # API_ENTRIES_MAX_LIMIT

  # Google Books provider
  google_books:
    endpoint: "https://www.googleapis.com/books/v1/volumes"
    page_size: 40                       # API_GOOGLE_BOOKS_PAGE_SIZE

  # Spotify provider (songs + podcasts)
  spotify:
    token_endpoint: "https://accounts.spotify.com/api/token"
    track_endpoint: "https://api.spotify.com/v1/tracks"
    search_endpoint: "https://api.spotify.com/v1/search"

  # TMDb provider (movies)
  tmdb:
    trending_endpoint: "https://api.themoviedb.org/3/trending/movie/week"
    now_playing_endpoint: "https://api.themoviedb.org/3/movie/now_playing"
    upcoming_endpoint: "https://api.themoviedb.org/3/movie/upcoming"
    popular_endpoint: "https://api.themoviedb.org/3/movie/popular"
    toprated_endpoint: "https://api.themoviedb.org/3/movie/top_rated"
    details_endpoint: "https://api.themoviedb.org/3/movie"
    max_pages: 5                        # API_TMDB_MAX_PAGES
    results_per_page: 20                # API_TMDB_RESULTS_PER_PAGE
    default_max_results: 10             # API_TMDB_DEFAULT_MAX_RESULTS
    mood_movies_limit: 12               # API_TMDB_MOOD_MOVIES_LIMIT
    filtered_limit: 6                   # API_TMDB_FILTERED_LIMIT


# ── ML ───────────────────────────────────────────────────────────
# All ML config: models, inference settings, embedding,
# insight generation, and model store (where weights come from).
ml:

  # Mood detection — RoBERTa
  # Inference: Backend/ml/inference/mood_detection/roberta/
  # Models:    Via MODEL_STORE_PATH (controlled by resolve_model_path)
  mood_detection:
    model_version: "v2"                 # MOOD_MODEL_VERSION — v2=fp16+ONNX optimized
    model_name: "roberta-base"          # MOOD_MODEL_NAME
    max_length: 128                     # MOOD_MAX_LENGTH
    prediction_threshold: 0.35          # MOOD_PREDICTION_THRESHOLD
    labels: ["anger", "disgust", "fear", "happy", "neutral", "sad", "surprise"]

  # Summarization — BART
  # Inference: Backend/ml/inference/summarization/bart/
  # Models:    Via MODEL_STORE_PATH (controlled by resolve_model_path)
  summarization:
    model_version: "v2"                 # SUMMARIZATION_MODEL_VERSION — v2=fp16+ONNX optimized
    model_name: "facebook/bart-large-cnn" # SUMMARIZATION_MODEL_NAME
    max_input_length: 1024              # SUMMARIZATION_MAX_INPUT_LENGTH
    max_summary_length: 128             # SUMMARIZATION_MAX_SUMMARY_LENGTH
    min_summary_length: 20              # SUMMARIZATION_MIN_SUMMARY_LENGTH
    num_beams: 4                        # SUMMARIZATION_NUM_BEAMS

  # Embedding — sentence-transformers
  embedding:
    model_name: "all-mpnet-base-v2"     # EMBEDDING_MODEL_NAME
    embedding_dimension: 384            # EMBEDDING_DIMENSION (all-mpnet-base-v2)
    device: "auto"                      # Device: "auto" | "cuda" | "cpu"
    use_half_precision: true            # Use float16 on CUDA
    journal_blend_weight: 0.05          # JOURNAL_BLEND_WEIGHT
    taste_blend_weight: 0.95            # TASTE_BLEND_WEIGHT

  # Insight generation — Qwen2 (local) or Gemini (cloud)
  # Inference: Backend/ml/inference/insight_generation/
  # Models:    Backend/ml/models/insight_generation/qwen2/{version}/
  insight_generation:
    use_gemini: true                   # INSIGHTS_USE_GEMINI — true=Gemini, false=Qwen2
    backend: "huggingface"             # INSIGHTS_BACKEND — "huggingface" | "ollama"
    model_version: "v1"                # INSIGHTS_MODEL_VERSION
    hf_model_name: "Qwen/Qwen2-1.5B-Instruct" # INSIGHTS_HF_MODEL_NAME
    hf_model_dir: "ml/models/insight_generation/qwen2/v1" # INSIGHTS_HF_MODEL_DIR
    ollama_model: "qwen2:1.5b"         # INSIGHTS_OLLAMA_MODEL
    ollama_base_url: "http://localhost:11434" # INSIGHTS_OLLAMA_BASE_URL
    temperature: 0.7                   # INSIGHTS_TEMPERATURE
    batch_size: 5                      # INSIGHTS_BATCH_SIZE
    max_new_tokens: 4096               # INSIGHTS_MAX_NEW_TOKENS
    gemini_model_name: "gemini-2.5-flash" # INSIGHTS_GEMINI_MODEL_NAME
    gemini_max_retries: 2             # INSIGHTS_GEMINI_MAX_RETRIES

  # Model store — controls where model weights are loaded from
  # source=local → via MODEL_STORE_PATH env var
  # source=gcs   → downloaded from GCS bucket at startup
  # source=s3    → downloaded from S3 bucket at startup
  # GCS/S3 path: {bucket}/{group}/{name}/{version}/
  # Local path:  {MODEL_STORE_PATH}/{group}/{name}/{version}/
  model_store:
    source: "local"                    # MODEL_SOURCE — "local" | "gcs" | "s3"
    local_path: ""                     # set via MODEL_STORE_PATH env var
    cache_dir: "/tmp/models"           # MODEL_CACHE_DIR
    gcs_bucket: ""                     # MODEL_GCS_BUCKET
    s3_bucket: ""                      # MODEL_S3_BUCKET
    s3_region: "us-east-1"            # MODEL_S3_REGION
    download_on_startup: true          # MODEL_DOWNLOAD_ON_STARTUP
    models:
      roberta:
        group: "mood_detection"
        name: "roberta"
        version: "v2"                  # MODEL_ROBERTA_VERSION
      bart:
        group: "summarization"
        name: "bart"
        version: "v2"                  # MODEL_BART_VERSION
      qwen2:
        group: "insight_generation"
        name: "qwen2"
        version: "v1"                  # MODEL_QWEN2_VERSION
      # embedding intentionally omitted — sentence-transformers downloads automatically


# ── Recommendation engine ────────────────────────────────────────
recommendation:
  fetch_limit: 200                     # RECOMMENDATION_FETCH_LIMIT
  refine_top: 100                      # RECOMMENDATION_REFINE_TOP
  top_k: 10                            # RECOMMENDATION_TOP_K

  ranking:
    similarity_weight: 0.9             # RANKING_SIMILARITY_WEIGHT
    popularity_weight: 0.1             # RANKING_POPULARITY_WEIGHT
    low_std_threshold: 0.03            # RANKING_LOW_STD_THRESHOLD
    
    # Phase 5: Advanced Ranking
    use_phase5: true                   # Use Phase 5 advanced ranking (MMR, temporal decay, etc.)
    use_mmr: true                      # Enable MMR diversification
    use_hybrid_scoring: true           # Enable hybrid scoring
    use_temporal_decay: true           # Enable temporal decay for old interactions
    
    # MMR (Maximal Marginal Relevance) settings
    mmr_lambda: 0.7                    # Relevance vs diversity trade-off (0-1, higher=more relevant)
    
    # Temporal decay settings
    temporal_decay_rate: 0.15          # Decay per day (0.15 = ~15% per day)
    
    # Hybrid scoring weights
    hybrid_weights:
      similarity: 0.5
      interaction_frequency: 0.2
      popularity: 0.2
      recency: 0.1
    
    # Performance limits
    max_candidates_for_ranking: 500    # Limit candidates to process (for performance)
    target_response_time_ms: 500       # Target response time

  intent:
    beta_min: 0.15                     # INTENT_BETA_MIN
    beta_boost: 0.35                   # INTENT_BETA_BOOST
    beta_max: 0.40                     # INTENT_BETA_MAX
    journal_embedding_fetch_limit: 1   # INTENT_JOURNAL_EMBEDDING_FETCH_LIMIT

  candidate:
    min_title_length: 3                # CANDIDATE_MIN_TITLE_LENGTH
    min_popularity: 1.0                # CANDIDATE_MIN_POPULARITY

  concurrency:
    intent_builder_max_workers: 3      # INTENT_BUILDER_MAX_WORKERS


# ── Interactions (Phase 4 Feedback Loop) ──────────────────────────
interactions:
  # Signal-to-weight mapping for feedback loop learning
  signal_weights:
    click: 0.02                         # Weight for click signal
    save: 0.05                          # Weight for save signal
    skip: -0.01                         # Weight for skip signal
  
  # Valid interaction values
  valid_media_types:
    - songs
    - movies
    - books
    - podcasts
  
  valid_signals:
    - click
    - save
    - skip
  
  valid_contexts:
    - recommendation
    - search
  
  # Rate limiting
  rate_limit_per_hour: 10              # Max interactions per media type per hour
  rate_limit_check_window_minutes: 60  # Window for rate limit check


# ── Search Service ───────────────────────────────────────────────
search:
  # Fuzzy search thresholds
  fuzzy_threshold_relevance: 75        # Minimum fuzzy score to include result
  fuzzy_threshold_dedup: 90            # Score to consider items duplicates
  
  # Search limits
  max_cache_results_per_type: 500      # Max items to score from cache
  default_search_limit: 20             # Default items to return
  max_search_limit: 100                # Maximum items to return
  
  # Search strategy
  fallback_to_provider: true           # Fallback to live provider if cache miss
  min_cache_results_for_success: 3     # Minimum results to consider cache hit
  
  # Performance
  search_timeout_seconds: 10           # Timeout for search operations
  concurrent_providers: 4              # Concurrent provider searches


# ── Providers Configuration ───────────────────────────────────────
providers:
  # Timeout for all provider requests
  default_timeout_seconds: 10
  
  # Retry configuration
  max_retries: 2
  retry_backoff_multiplier: 1.5
  
  # Result limits
  default_max_results: 20
  max_max_results: 100
  
  # TMDb specific (movies)
  tmdb:
    timeout_seconds: 10
    max_pages: 5
    results_per_page: 20
    default_max_results: 10
    mood_movies_limit: 12
    filtered_limit: 6
    popularity_threshold: 1.0           # Min popularity score
  
  # Spotify specific (songs & podcasts)
  spotify:
    timeout_seconds: 10
    default_max_results: 20
    market_default: "US"
  
  # Google Books specific (books)
  google_books:
    timeout_seconds: 10
    page_size: 40
    default_max_results: 20
  
  # Podcast API specific (podcasts)
  podcast_api:
    timeout_seconds: 10
    default_max_results: 20


# ── Media cache ──────────────────────────────────────────────────
cache:
  max_age_hours: 24                    # MEDIA_CACHE_MAX_AGE_HOURS
  fetch_limit: 500                     # MEDIA_CACHE_FETCH_LIMIT
  batch_size: 400                      # MEDIA_CACHE_BATCH_SIZE
  schema_version: "v1"                 # MEDIA_CACHE_SCHEMA_VERSION

  supported_media_types:
    - movies
    - songs
    - books
    - podcasts

  language_buckets:
    songs:
      - language: hindi
        queries: ["hindi songs", "bollywood hits", "hindi film songs"]
        market: IN
      - language: english
        queries: ["english pop hits", "top english songs", "english top 40"]
        market: US
      - language: neutral
        queries: ["top hits", "popular songs"]
        market: null
    podcasts:
      - language: hindi
        queries: ["hindi podcast", "bollywood podcast"]
        market: IN
      - language: english
        queries: ["popular podcast", "top podcast episodes"]
        market: US
      - language: neutral
        queries: ["top podcast episodes"]
        market: null
    movies:
      - language: neutral
        queries: null
        market: null
    books:
      - language: neutral
        queries: null
        market: null


# ── Background jobs ──────────────────────────────────────────────
jobs:
  cache_refresh: {}


# ── System Limits & Processing ───────────────────────────────────
system:
  limits:
    # API response limits
    default_top_k: 10                   # Default number of recommendations
    max_top_k: 50                       # Maximum allowed top_k
    max_limit: 100                      # Maximum results to return
    
    # Text processing
    min_text_length: 1                  # Minimum text length for processing
    max_text_length: 5000               # Maximum text length to process
    
    # Embedding dimensions
    embedding_dim: 384                  # Standard embedding dimension
    
    # Batch processing
    batch_size_default: 32              # Default batch size
    batch_size_embedding: 32            # Batch size for embeddings
    batch_size_inference: 16            # Batch size for ML inference
    
    # Performance & memory
    max_concurrent_requests: 50         # Max concurrent requests
    request_timeout_seconds: 30         # General request timeout
    
  # Data retention
  retention:
    interactions_days: 90               # Keep interactions for N days
    embeddings_days: 180                # Keep embeddings for N days
    cache_TTL_hours: 24                 # Cache TTL in hours
  
  # Normalized text processing
  text:
    normalize_before_search: true       # Normalize text in search
    case_sensitive_search: false        # Case-insensitive search
    remove_punctuation: true            # Remove special chars
  
  # Numerical precision
  numeric:
    float_precision: "float32"          # Default float precision
    similarity_precision: "float32"     # Similarity computation precision
    min_similarity_value: -1.0          # Min cosine similarity
    max_similarity_value: 1.0           # Max cosine similarity


