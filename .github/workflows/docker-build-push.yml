name: Build and push Docker image

on:
  push:
    branches:
      - main
      - feature/mood_detection

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA and normalized repo name
        id: meta
        run: |
          short_sha=$(git rev-parse --short HEAD)
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_lc=$(echo "$repo_name" | tr '[:upper:]' '[:lower:]')
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$repo_lc" >> "$GITHUB_OUTPUT"

      - name: Pre-flight validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.SONG_ID }}" ]; then echo "Missing required secret: SONG_ID" >&2; missing=1; fi
          if [ -z "${{ secrets.SONG_SECRET }}" ]; then echo "Missing required secret: SONG_SECRET" >&2; missing=1; fi
          if [ -z "${{ secrets.TMDB_API_KEY }}" ]; then echo "Missing required secret: TMDB_API_KEY" >&2; missing=1; fi
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "Missing required secret: GEMINI_API_KEY" >&2; missing=1; fi
          if [ -z "${{ secrets.FIREBASE_WEB_API_KEY }}" ]; then echo "Missing required secret: FIREBASE_WEB_API_KEY" >&2; missing=1; fi
          if [ -z "${{ secrets.FIREBASE_CREDENTIALS_JSON }}" ]; then echo "Missing required secret: FIREBASE_CREDENTIALS_JSON" >&2; missing=1; fi
          if [ "$missing" -ne 0 ]; then echo "One or more required secrets are missing. Failing pre-flight." >&2; exit 1; fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.repo_lc }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          secrets: |
            SONG_ID=${{ secrets.SONG_ID }}
            SONG_SECRET=${{ secrets.SONG_SECRET }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
            firebase=${{ secrets.FIREBASE_CREDENTIALS_JSON }}
