name: Build and push Docker image

on:
  push:
    branches:
      - main
      - feature/mood_detect

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA and normalized repo name
        id: meta
        run: |
          short_sha=$(git rev-parse --short HEAD)
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_lc=$(echo "$repo_name" | tr '[:upper:]' '[:lower:]')
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$repo_lc" >> "$GITHUB_OUTPUT"

      - name: Normalize owner name (FIX)
        id: owner
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"

      - name: Pre-flight validate required secrets
        run: |
          missing=0
          check_secret() {
            if [ -z "$1" ]; then
              echo "Missing required secret: $2" >&2
              missing=1
            fi
          }

          check_secret "${{ secrets.SONG_ID }}" SONG_ID
          check_secret "${{ secrets.SONG_SECRET }}" SONG_SECRET
          check_secret "${{ secrets.TMDB_API_KEY }}" TMDB_API_KEY
          check_secret "${{ secrets.GEMINI_API_KEY }}" GEMINI_API_KEY
          check_secret "${{ secrets.FIREBASE_WEB_API_KEY }}" FIREBASE_WEB_API_KEY

          # Handle multiline secret safely
          firebase_json='${{ secrets.FIREBASE_CREDENTIALS_JSON }}'
          if [ -z "$firebase_json" ]; then
            echo "Missing required secret: FIREBASE_CREDENTIALS_JSON" >&2
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Failing pre-flight." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ steps.meta.outputs.repo_lc }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          secrets: |
            SONG_ID=${{ secrets.SONG_ID }}
            SONG_SECRET=${{ secrets.SONG_SECRET }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
            firebase=${{ secrets.FIREBASE_CREDENTIALS_JSON }}