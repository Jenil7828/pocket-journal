name: Build and push Docker image

on:
  push:
    branches:
      - main
      - feature/mood_detect

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA and normalized repo name
        id: meta
        run: |
          short_sha=$(git rev-parse --short HEAD)
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_lc=$(echo "$repo_name" | tr '[:upper:]' '[:lower:]')
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$repo_lc" >> "$GITHUB_OUTPUT"

      - name: Normalize owner name (FIX)
        id: owner
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"

      # NOTE: secrets are intentionally NOT supplied at build time.
      # All secrets must be provided at runtime as environment variables when running the container.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ steps.meta.outputs.repo_lc }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          # No build-time secrets. Secrets must be provided at container runtime via environment variables.
